<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seam Downloader</title>
  <meta name="description" content="Seam Downloader — a video downloader for Android.">
  <style>
    :root {
      --bg: #0b0f14;
      --fg: #e8ecf1;
      --muted: #8892a0;
      --accent: #2bb3d6;
      --link: #7ce8e8;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    main {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.25rem);
      font-weight: 900;
      margin: 0 0 0.5rem;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #7ce8e8, #2bb3d6, #0b5fa8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      color: var(--muted);
      font-size: 1.1rem;
      margin: 0 0 2.5rem;
    }
    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      font-size: 0.95rem;
    }
    a {
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 120ms ease;
    }
    a:hover { border-bottom-color: var(--link); }
    footer {
      margin-top: auto;
      padding-top: 3rem;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Seam Downloader</h1>
    <p class="tagline">A video downloader for Android.</p>
    <nav class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="mailto:erik@seamdownloader.com">Contact</a>
    </nav>
  </main>
  <footer>© Seam Apps</footer>
</body>
</html>
